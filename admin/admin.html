<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <header>
        <h1>Admin Dashboard</h1>
    </header>
    <main>
        <form id="namingForm" enctype="multipart/form-data">
            <label for="stage">Stage:</label>
            <input type="text" id="stage" name="stage" required>
            <label for="entryTerm">Term:</label>
            <input type="text" id="entryTerm" name="entryTerm" required>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="directory">Directory:</label>
            <input type="text" id="directory" name="directory" required>
            <label for="session">Session:</label>
            <input type="text" id="session" name="session" required>
            <label for="type">Type:</label>
            <input type="text" id="type" name="type" required>
            <label for="file">Video File:</label>
            <input type="file" id="file" name="file" accept="video/*">
            <button type="button" id="addEntryButton">Add Entry</button>
        </form>
    </main>
    <script type="module" src="admin.js"></script>
</body>

</html>
