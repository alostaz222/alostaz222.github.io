<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="/css/auth.css" type="text/css">
</head>

<body id="auth">
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-database-compat.js"></script>
    
    <div class="auth">

        <div class="welcome">
            <h1>انضم الى عائلة الأستاذ</h1>
        </div>

        <div class="container">
            <div class="logo">
                <img src="/favicon/fav-png(144).png" alt="logo">
            </div>
            
            <div class="showButtons">
                <button onclick="showSignUp()">انشئ حسابًا</button>
                <button onclick="showSignIn()">تسجيل الدخول</button>
            </div>
        </div>

        <form id="signupForm" class="form">
            <input type="text" id="username"  placeholder="Username">
            <input type="email" id="email" placeholder="Email">
            <input type="tel" id="phone" placeholder="Phone Number">
            <input type="password" id="password1" placeholder="Password">
            <input type="password" id="password2" placeholder="Re-write Password">
            <button type="submit" id="sign-up">Sign Up</button>
        </form>

        <form id="signInForm" class="form">
            <input type="text" id="authenticator" placeholder="Username or Email">
            <input type="password" id="password" placeholder="Password">
            <button type="submit" id="sign-in">Sign In</button>
        </form>
    </div>

    <script type="module" src="/js/auth.js"></script>
</body>

</html>
